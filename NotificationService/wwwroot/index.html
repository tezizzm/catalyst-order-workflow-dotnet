<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dapr Order Workflow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <img src="dapr-logo.png" alt="Dapr Logo" class="dapr-logo">
                <h1>Dapr Order Workflow</h1>
            </div>
            <p class="subtitle">Real-time order notifications</p>
            <div class="status-indicator">
                <span id="connection-status" class="status-dot disconnected"></span>
                <span id="connection-text">Connecting...</span>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-notifications">0</div>
                <div class="stat-label">Total Notifications</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="order-notifications">0</div>
                <div class="stat-label">Order Updates</div>
            </div>
        </div>

        <div class="controls">
            <button id="clear-btn" class="btn btn-secondary">Clear Notifications</button>
            <button id="create-order-btn" class="btn btn-primary">Create New Order</button>
        </div>

        <div class="notifications-section">
            <h2>Recent Notifications</h2>
            <div id="notifications-container" class="notifications-container">
                <div class="empty-state">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <p>No notifications yet</p>
                    <p class="empty-subtitle">Waiting for order events...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Order Modal -->
    <div id="order-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Order</h2>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <form id="order-form">
                <div class="form-group">
                    <label for="customer-id">Customer ID</label>
                    <input type="text" id="customer-id" name="customerId" placeholder="e.g., Alice" required>
                </div>

                <div class="form-section">
                    <h3>Order Items</h3>
                    <div id="items-container">
                        <div class="item-row">
                            <div class="form-group">
                                <label>Product ID</label>
                                <select name="productId" class="form-select" required>
                                    <option value="" disabled selected>Select a product...</option>
                                    <option value="prod-001">prod-001</option>
                                    <option value="prod-002">prod-002</option>
                                    <option value="prod-003">prod-003</option>
                                    <option value="prod-004">prod-004</option>
                                    <option value="prod-005">prod-005</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Quantity</label>
                                <input type="number" name="quantity" min="1" value="1" required>
                            </div>
                            <div class="form-group">
                                <label>Price</label>
                                <input type="number" name="price" min="0" step="0.01" placeholder="29.99" required>
                            </div>
                            <button type="button" class="btn-remove-item" title="Remove item">×</button>
                        </div>
                    </div>
                    <button type="button" id="add-item-btn" class="btn btn-secondary">+ Add Item</button>
                </div>

                <div class="modal-actions">
                    <button type="button" id="cancel-order-btn" class="btn btn-secondary">Cancel</button>
                    <div class="btn-group">
                        <button type="submit" class="btn-group-primary">Create Order</button>
                        <button type="button" id="create-order-x10-btn" class="btn-group-stat" title="Create 10 orders">×10</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="chaos-dropdown" id="chaos-dropdown">
        <div class="chaos-split-btn">
            <a href="http://localhost:2333" target="_blank" class="chaos-split-main">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                Chaos Mesh
                <span class="chaos-live-dot"></span>
            </a>
            <button class="chaos-split-arrow" id="chaos-dropdown-arrow" aria-label="Chaos actions" aria-expanded="false">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
        </div>
        <div class="chaos-dropdown-menu" id="chaos-dropdown-menu">
            <div class="chaos-service-row">
                <span id="inventory-status" class="status-dot disconnected"></span>
                <span class="chaos-service-label">Inventory Service</span>
            </div>
            <div class="chaos-dropdown-divider"></div>
            <button id="chaos-toggle-btn" class="chaos-dropdown-item">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                <span id="chaos-action-label">Start Experiment</span>
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
