apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-manager
  namespace: catalyst-order-workflow-demo
  labels:
    app: order-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-manager
  template:
    metadata:
      labels:
        app: order-manager
    spec:
      containers:
        - name: order-manager
          # You can use this public image for the demo, or build and push your own
          image: public.ecr.aws/e9f1v8j5/catalyst-demo/order-manager:2.11
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # Ensure the secret 'catalyst-app-tokens' is created with key 'order-manager' containing the App ID token
            - name: DAPR_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: catalyst-app-tokens
                  key: order-manager
          envFrom:
            - configMapRef:
                name: catalyst-env
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-manager
  labels:
    app: order-manager
spec:
  selector:
    app: order-manager
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
