apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: catalyst-order-workflow-demo
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          # You can use this public image for the demo, or build and push your own
          image: public.ecr.aws/e9f1v8j5/catalyst-demo/notification-service:2.13
          imagePullPolicy: IfNotPresent
          command: ["dotnet", "NotificationService.dll"]
          ports:
            - containerPort: 8080
          env:
            # Ensure the secret 'catalyst-app-tokens' is created with key 'notification-service' containing the App ID token
            - name: DAPR_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: catalyst-app-tokens
                  key: notification-service
            - name: ChaosMesh__DashboardUrl
              value: "https://catalyst-demo-chaosmesh.diagrid.us"
            # Optional: inject Chaos Mesh token to enable chaos experiments from the UI
            - name: CHAOS_MESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: chaos-mesh-account-token
                  key: token
                  optional: true
          envFrom:
            - configMapRef:
                name: catalyst-env
          volumeMounts:
            # Optional: mount chaos experiment definition (apply k8s/demo-services/chaos-mesh.yaml to enable)
            - name: chaos-experiment
              mountPath: /etc/chaos
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: chaos-experiment
          configMap:
            name: chaos-experiment-config
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service-public
  labels:
    app: notification-service
  annotations:
    service.beta.kubernetes.io/azure-pip-name: "catalyst-demo-public"
    service.beta.kubernetes.io/azure-load-balancer-resource-group: "demo"
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: LoadBalancer
